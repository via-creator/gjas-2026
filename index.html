<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Serif+KR:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#1A2830;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.wrap{width:100%;max-width:420px}
.header{text-align:center;margin-bottom:32px}
.header-label{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.4);margin-bottom:8px}

.header-sub{font-size:12px;color:rgba(255,255,255,.45);margin-top:8px}
.cards{display:flex;flex-direction:column;gap:12px}
.card{display:block;text-decoration:none;background:white;border-radius:14px;padding:18px 20px;transition:transform .15s,box-shadow .15s;border-left:5px solid}
.card:active{transform:scale(.98)}
.card.verify{border-left-color:#2F3E46}
.card.elem{border-left-color:#2E5894}
.card.mid{border-left-color:#6A5D7B}
.card-top{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.card-emoji{font-size:26px;line-height:1}
.card-name{font-size:17px;font-weight:700;color:#1A1A1A}
.card-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-left:4px}
.card.verify .card-badge{background:#F0EDE8;color:#2F3E46}
.card.elem .card-badge{background:#D6E0EE;color:#2E5894}
.card.mid .card-badge{background:#E6E1ED;color:#6A5D7B}
.card-desc{font-size:12px;color:#5A6068;line-height:1.6;padding-left:38px}
.divider{text-align:center;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:2px;margin:4px 0}
.footer{text-align:center;font-size:10px;color:rgba(255,255,255,.2);margin-top:28px;letter-spacing:.5px}
</style>
</head>
<body>
<div class="wrap">
